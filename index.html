<!DOCTYPE html>
<html lang="th">
<head><meta charset="UTF-8"><title>Tracking</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;font-size:13px;background:#f5f7fa;color:#222;padding:16px}
h1{font-size:15px;font-weight:700;color:#1F3864;margin-bottom:2px}
.meta{font-size:11px;color:#666;margin-bottom:12px}
.sum{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.sc{background:#fff;border:1px solid #dde;border-radius:8px;padding:8px 14px;min-width:110px;text-align:center}
.sl{font-size:11px;color:#888}
.sv{font-size:20px;font-weight:700}
.leg{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px;font-size:11px;color:#666;align-items:center}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:3px}
.fbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.fbar button{font-size:11px;padding:3px 10px;border:1px solid #bbb;border-radius:20px;background:#fff;color:#555;cursor:pointer}
.fbar button.on{background:#ddeeff;color:#0C447C;border-color:#7ab}
.tw{overflow-x:auto;border:1px solid #dde;border-radius:10px;background:#fff}
table{width:100%;border-collapse:collapse;min-width:900px}
th{padding:7px 8px;font-size:11px;font-weight:700;color:#555;border-bottom:1px solid #eee;background:#f8f9fb;text-align:left;white-space:nowrap}
td{padding:6px 8px;border-bottom:1px solid #f0f0f0;font-size:12px;vertical-align:middle}
tr.cr td{background:#edf2fb;font-weight:700;font-size:11px;color:#1F3864;padding:5px 8px}
tr.dr:hover td{background:#f5f9ff}
tr:last-child td{border-bottom:none}
.bdg{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;border:none}
.bn{background:#FFF2CC;color:#7F5000}
.bp{background:#DDEEFF;color:#0C447C}
.dok{color:#3B6D11;font-size:12px;font-weight:600}
.dw{color:#BA7517;font-weight:700;font-size:12px}
.du{color:#A32D2D;font-weight:700;font-size:12px}
.dm{color:#aaa;font-size:12px}
.eb{font-size:10px;padding:2px 5px;border:1px solid #ddd;border-radius:4px;background:#fff;color:#888;cursor:pointer;margin-left:3px}
.eb:hover{background:#f0f0f0}
.nm{font-size:12px}
.sp{font-size:11px;color:#888}
.rm{font-size:11px;color:#BA7517}
</style>
</head>

{c:'1',t:'44',n:'ชุดเครื่องมือผ่าตัด Minor Set',s:'บจ.ออโรร่า แอดวานซ์',d:120,dp:'-',bl:'-',r:'',st:'po'},

{c:'1',t:'48',n:'ชุดโลหะดามกระดูกภายนอกขนาดใหญ่',s:'บจ.เอ็มดีซี (ประเทศไทย)',d:150,dp:'-',bl:'-',r:'',st:'po'},
{c:'2',t:'1',n:'กระโจมพยาบาลสนามชนิดโครงท่ออากาศ 56 ตร.ม. (15 หลัง)',s:'LANCO',d:null,dp:'-',bl:'-',r:'',st:'nopo'},
{c:'2',t:'2',n:'กระโจมพยาบาลสนามชนิดโครงท่ออากาศ 42 ตร.ม. (5 หลัง)',s:'LANCO',d:null,dp:'-',bl:'-',r:'',st:'nopo'},
{c:'2',t:'5',n:'รถ ATV พร้อม Trailer เคลื่อนย้ายผู้ประสบภัย',s:'บจ.แอดวานซ์เรสคิว โซลูชั่น',d:null,dp:'-',bl:'-',r:'',st:'po'},

{c:'2',t:'10',n:'โต๊ะพับเอนกประสงค์ (31 ตัว)',s:'บจ.โอเอเฟอร์นิเจอร์',d:null,dp:'-',bl:'-',r:'',st:'po'},

{c:'2',t:'17',n:'เครื่องกำเนิดไฟฟ้า 1 เฟส ≥10 kVA พร้อมตู้ MDB (36 เครื่อง)',s:'บจ.เอส.อี.เอ พาวเวอร์ เจ็นท์',d:null,dp:'-',bl:'-',r:'SEA 14S',st:'po'},
{c:'2',t:'18',n:'เครื่องปรับอากาศเคลื่อนที่ห้องผ่าตัด ≥36,000 BTU (4 เครื่อง)',s:'บจ.สยามเทมป์',d:null,dp:'-',bl:'-',r:'',st:'po'},

{c:'3',t:'26',n:'เสื้อชูชีพปฎิบัติงานในกระแสน้ำเชี่ยว Personal Floatation Device (20 ตัว)',s:'บจ.แอดวานซ์เรสคิว โซลูชั่น',d:null,dp:'-',bl:'-',r:'',st:'nopo'},

];
function fmtD(d){if(!d)return'-';return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+(d.getFullYear()+543)}
function depDate(days){if(!days)return null;let d=new Date(LD);d.setDate(d.getDate()-days);return d}
function dl(d){if(!d)return null;return Math.round((d-TD)/86400000)}
let fc='all';
function sf(f){fc=f;document.querySelectorAll('.fbar button').forEach(b=>b.classList.remove('on'));document.getElementById('f-'+f).classList.add('on');render()}
function tog(i){D[i].st=D[i].st==='po'?'nopo':'po';if(D[i].st==='po'&&!D[i].pd)D[i].pd=fmtD(new Date());render()}
function editPD(i){let v=prompt('วันเปิด PO (dd/mm/yyyy พ.ศ.):', D[i].pd||'');if(v!==null){D[i].pd=v.trim();render()}}
function editR(i){let v=prompt('หมายเหตุ:', D[i].r||'');if(v!==null){D[i].r=v.trim();render()}}
function render(){
  const tb=document.getElementById('tb');tb.innerHTML='';
  let vis=D.map((x,i)=>({...x,_i:i}));
  if(fc==='nopo')vis=vis.filter(x=>(x.st||'nopo')==='nopo');
  else if(fc==='po')vis=vis.filter(x=>x.st==='po');
  else if(fc!=='all')vis=vis.filter(x=>x.c===fc);
  let lc='',rn=0;
  vis.forEach(it=>{
    if(it.c!==lc){lc=it.c;rn=0;const tr=document.createElement('tr');tr.className='cr';tr.innerHTML='<td colspan="11">'+CATS[it.c]+'</td>';tb.appendChild(tr)}
    rn++;
    const dd=depDate(it.d),daysL=dl(dd);
    let ds='-',dc='dm';
    if(dd){ds=fmtD(dd);dc=daysL<0?'du':daysL<=30?'dw':'dok'}
    const st=it.st||'nopo';
    const tr=document.createElement('tr');tr.className='dr';
    tr.innerHTML=`<td style="color:#aaa;font-size:11px;text-align:center">${rn}</td>
<td style="color:#aaa;font-size:11px;text-align:center">${it.t}</td>
<td><div class="nm">${it.n}</div><div class="sp">${it.s}</div></td>
<td style="text-align:center;color:#888">${it.d||'<span class="dm">-</span>'}</td>
<td class="${dc}">${ds}</td>
<td style="color:#888;font-size:12px">14/07/2569</td>
<td style="text-align:center"><span class="bdg ${st==='nopo'?'bn':'bp'}" onclick="tog(${it._i})">${st==='nopo'?'ยังไม่เปิด PO':'เปิด PO แล้ว'}</span></td>
<td style="font-size:11px">${it.pd||'<span class="dm">-</span>'}<button class="eb" onclick="editPD(${it._i})">แก้ไข</button></td>
<td style="font-size:11px">${it.dp}</td>
<td style="font-size:11px">${it.bl}</td>
<td>${it.r?'<span class="rm">'+it.r+'</span>':''}<button class="eb" onclick="editR(${it._i})">${it.r?'แก้':'+ เพิ่ม'}</button></td>`;
    tb.appendChild(tr);
  });
  const tot=D.length,po=D.filter(x=>x.st==='po').length,nopo=tot-po;
  const urg=D.filter(x=>{const dd=depDate(x.d),daysL=dl(dd);return daysL!==null&&daysL<=30&&(x.st||'nopo')==='nopo'}).length;
  document.getElementById('sum').innerHTML=`
<div class="sc"><div class="sl">รายการทั้งหมด</div><div class="sv" style="color:#222">${tot}</div></div>
<div class="sc"><div class="sl">เปิด PO แล้ว</div><div class="sv" style="color:#185FA5">${po}</div></div>
<div class="sc"><div class="sl">ยังไม่เปิด PO</div><div class="sv" style="color:#BA7517">${nopo}</div></div>
<div class="sc"><div class="sl">ต้องโอนมัดจำ ≤30 วัน</div><div class="sv" style="color:#A32D2D">${urg}</div></div>`;
}
render();
</script>
</body></html>
